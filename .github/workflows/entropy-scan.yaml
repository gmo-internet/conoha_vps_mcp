name: entropy-scan

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  entropy-scan:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout files
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "24.13.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: npm audit --audit-level=high 2>&1 | tee audit-output.txt
        continue-on-error: true

      - name: Run knip
        id: knip
        run: npm run knip 2>&1 | tee knip-output.txt
        continue-on-error: true

      - name: Run dependency-cruiser
        id: depcruise
        run: npm run depcruise 2>&1 | tee depcruise-output.txt
        continue-on-error: true

      - name: Create issue on failure
        if: github.event_name == 'schedule' && (steps.audit.outcome == 'failure' || steps.knip.outcome == 'failure' || steps.depcruise.outcome == 'failure')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const failures = [];

            if ('${{ steps.audit.outcome }}' === 'failure') {
              const output = fs.readFileSync('audit-output.txt', 'utf8');
              failures.push(`### npm audit\n\`\`\`\n${output.slice(0, 2000)}\n\`\`\``);
            }
            if ('${{ steps.knip.outcome }}' === 'failure') {
              const output = fs.readFileSync('knip-output.txt', 'utf8');
              failures.push(`### knip\n\`\`\`\n${output.slice(0, 2000)}\n\`\`\``);
            }
            if ('${{ steps.depcruise.outcome }}' === 'failure') {
              const output = fs.readFileSync('depcruise-output.txt', 'utf8');
              failures.push(`### dependency-cruiser\n\`\`\`\n${output.slice(0, 2000)}\n\`\`\``);
            }

            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Entropy scan: violations detected (${today})`,
              body: `Weekly entropy scan detected the following violations:\n\n${failures.join('\n\n')}\n\n---\nGenerated by entropy-scan workflow`,
              labels: ['entropy-scan']
            });

      - name: Fail on violations (PR only)
        if: github.event_name != 'schedule' && (steps.audit.outcome == 'failure' || steps.knip.outcome == 'failure' || steps.depcruise.outcome == 'failure')
        run: |
          echo "::error::Entropy scan detected violations"
          echo "audit: ${{ steps.audit.outcome }}"
          echo "knip: ${{ steps.knip.outcome }}"
          echo "depcruise: ${{ steps.depcruise.outcome }}"
          exit 1
