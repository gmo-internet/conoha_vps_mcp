name: escalation-tracker

on:
  schedule:
    - cron: "0 9 * * 1" # 毎週月曜 9:00 UTC（entropy-scanと同一スケジュール）
  workflow_dispatch:

jobs:
  track-escalation:
    if: github.repository == 'gmo-internet/priv_conoha_vps_mcp'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: read
    timeout-minutes: 5

    steps:
      - name: L2違反ラベル集計・エスカレーション候補検出
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            // ESCALATION.md の L2 ルール一覧
            const L2_RULES = ['B-5', 'B-6', 'E-1', 'E-2', 'F-3'];
            const THRESHOLD = 3;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const ruleId of L2_RULES) {
              const violationLabel = `pattern-violation:${ruleId}`;

              // pattern-violation ラベル付きの closed issue/PR を検索
              const { data: items } = await github.rest.issues.listForRepo({
                owner,
                repo,
                labels: violationLabel,
                state: 'closed',
                per_page: 100,
              });

              // マージ済みPRのみ抽出（issues.listForRepo は issue と PR の両方を返す）
              const mergedPrs = items.filter(item => item.pull_request?.merged_at);

              core.info(`${ruleId}: ${mergedPrs.length} merged PRs with violation label`);

              if (mergedPrs.length < THRESHOLD) continue;

              const escalationLabel = `escalation-candidate:${ruleId}`;

              // 既存の open エスカレーション Issue を検索
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                labels: escalationLabel,
                state: 'open',
              });

              // 既存の closed エスカレーション Issue を検索（対応済み）
              const { data: closedIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                labels: escalationLabel,
                state: 'closed',
              });

              if (closedIssues.length > 0) {
                core.info(`${ruleId}: escalation already handled (closed issue exists), skipping`);
                continue;
              }

              // Issue body を構築
              const prList = mergedPrs
                .map(pr => `- #${pr.number} ${pr.title}`)
                .join('\n');

              const body = [
                `## L2→L3 エスカレーション候補: ${ruleId}`,
                '',
                `ルール \`${ruleId}\` の違反がマージ済みPRで **${mergedPrs.length}件** 検出されました（閾値: ${THRESHOLD}件）。`,
                '',
                '### 違反PR一覧',
                prList,
                '',
                '### 推奨アクション',
                '',
                '1. L3自動検出手段の検討（Biome / dependency-cruiser / カスタムスクリプト等）',
                '2. KDR作成（`harness/decisions/KDR-NNNN-{rule-id}-l3-promotion.md`）',
                '3. `harness/ESCALATION.md` のレベル更新',
                '',
                '### 参照',
                '',
                '- エスカレーションラダー: `harness/ESCALATION.md`',
                '- 昇格基準: 「3回以上検出 + 自動検出手段あり」',
                '',
                '---',
                'Generated by escalation-tracker workflow',
              ].join('\n');

              if (openIssues.length > 0) {
                // 既存 Issue を更新
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: openIssues[0].number,
                  body,
                });
                core.info(`${ruleId}: updated existing issue #${openIssues[0].number}`);
              } else {
                // 新規 Issue 作成
                const { data: newIssue } = await github.rest.issues.create({
                  owner,
                  repo,
                  title: `L2→L3 エスカレーション候補: ${ruleId}（違反${mergedPrs.length}件）`,
                  body,
                  labels: [escalationLabel, 'escalation-candidate'],
                });
                core.info(`${ruleId}: created escalation issue #${newIssue.number}`);
              }
            }
