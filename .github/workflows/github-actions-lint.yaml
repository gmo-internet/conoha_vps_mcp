name: github-actions-lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"

jobs:
  actionlint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5
    steps:
      - name: Checkout files
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@4e7a2a413e3eb11a7131460f8c1206e03ab57c68 # v1
        with:
          reporter: github-pr-review
          fail_level: error
