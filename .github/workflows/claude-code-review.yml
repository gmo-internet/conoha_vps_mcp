name: Claude Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.ts"

jobs:
  claude-review:
    if: github.repository == 'gmo-internet/priv_conoha_vps_mcp'
    runs-on: ubuntu-24.04
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@a017b830c03e23789b11fb69ed571ea61c12e45c # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            このPRの変更ファイルを `harness/patterns/` のコーディングパターンおよび `CLAUDE.md` の規約に基づいてレビューしてください。

            一般的なレビュー観点:
            - コード品質とベストプラクティス
            - 潜在的なバグ
            - セキュリティ
            - テストカバレッジ

            特に以下のセマンティックルール（機械チェック不可）を重点確認:
            - B-4: クライアント関数名が {get|create|delete|update}{Service} パターンに従うか
            - B-5: 非storageクライアントが executeOpenstackApi() → formatResponse() チェーンか
            - B-6: storageクライアントが generateApiToken() を直接使用しているか
            - D-5: response-formatterのcatchが JSON.stringify({status, statusText, body: "<error>"}) を返すか
            - E-1/E-2: テストが vi.mock() / vi.mocked(await import(...)) パターンを使用しているか
            - F-3: JSDocが日本語で記述されているか
            - H-4: 真の定数が UPPER_SNAKE_CASE か

            違反があれば ERROR（必須修正）として指摘してください。
            違反を検出した場合、各違反のルールIDをPRラベルとして付与してください（例: `gh pr edit --add-label "pattern-violation:B-4"`）。
            `gh pr comment` で結果をPRコメントとして投稿してください。

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr edit:*)"'
